version: '3.8'

services:
  # Base Firebase emulator if local testing needed (optional for pure prod deploy)
  
  api:
    build: 
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - ./server/.env
    volumes:
      - ./server/uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - api
    restart: unless-stopped
